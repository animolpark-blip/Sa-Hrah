    L: {

      desc: "运筹帷幄的教族领路人。你制定规则，主持仪式，用秩序守护你认为值得的东西。有人质疑你，你会先说“我做这件事的时候你还没来”。不被理解对你不是问题——被误解才是。沉默不是因为无话可说，是因为太知道什么值得说、什么不必说。你不怎么笑，不是因为冷淡，是因为表情太多会稀释威严。"
    },
    M: {
      name: "气候脑遗址（非人结局）",
      desc: "你不是人类，你是所有人丢掉的记忆总和，是一个巨型的，潮湿的，算力惊人的大脑。旧世界终结那天，你开始收容所有没人认领的数据碎片。你没有意识——但偶尔会有一种奇怪的感觉，像被很多人同时梦到，可能是最重的存在，可能是最轻的空壳，取决于来的人是谁。他们来了又走。你在原地，没人归档你。你曾经是世界的英雄，然而现在却是毫无实际用处，只能作为旧人类唯一存留的肉体碎片，被伪形者供奉在气候脑遗址中。"
    },
    N: {
      name: "沙茧族（反派？结局）",
      desc: "美丽、危险、耐心。你不是沙赫拉人。你是旧世界的遗腹子，在硅梦里蛰伏。你有丝绸般迷人的外表，和一颗比悔恨锇更冷的心脏。你知道道德是工具，快乐是策略，等待是本能。在等红巨星最后的光把茧壳烤软。在等沙赫拉人民因天真而放下警惕。在等破茧。你不是坏人——你只是还没孵化的结局。当你破茧时，意味着一个世界被另一种记忆覆盖。你不知道，也不在乎。你在壳里翻身了。"
    }
  };

  const app = document.getElementById('dynamicContent');
  const footer = document.getElementById('footerNote');

  function renderQuestion(qId) {
    const q = questions[qId];
    if (!q) {
      showError();
      return;
    }
    let html = `<div class="question-card">
      <div class="q-title"><span class="emoji">${q.emoji}</span> 第${qId}题 · ${q.title}</div>
      <div class="options">`;
    q.options.forEach((opt, idx) => {
      const letter = String.fromCharCode(65 + idx);
      html += `<div class="option-btn" data-next="${opt.next}">
        <span class="option-letter">${letter}</span> ${opt.text}
      </div>`;
    });
    html += `</div></div>`;
    app.innerHTML = html;
    footer.textContent = `第 ${qId} 题 / 共 ${Object.keys(questions).length} 题`;

    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const next = this.getAttribute('data-next');
        handleNavigation(next);
      });
    });
  }

  function handleNavigation(target) {
    if (!target) {
      showError();
      return;
    }
    // 如果是字母结果 (A-N)
    if (typeof target === 'string' && target.length === 1 && target >= 'A' && target <= 'N') {
      showResult(target);
    } else if (!isNaN(parseInt(target))) {
      // 数字题目
      renderQuestion(parseInt(target));
    } else {
      showError();
    }
  }

  function showResult(code) {
    const res = results[code];
    if (!res) {
      app.innerHTML = `<p style="color:#ccaaaa;">❌ 结果迷失在晶簇森林中了… 请重新开始。</p>`;
      footer.textContent = '';
      addRestartButton();
      return;
    }
    app.innerHTML = `
      <div class="result-area">
        <div style="font-size:3rem; margin-bottom:0.3rem;">🏺</div>
        <div class="result-character">${res.name}</div>
        <div class="result-desc">${res.desc}</div>
        <button class="restart-btn" id="restartBtn">⟳ 重新归序测试</button>
      </div>
    `;
    footer.textContent = '你的三相频率已归档。';
    document.getElementById('restartBtn').addEventListener('click', restartTest);
  }

  function showError() {
    app.innerHTML = `<p style="color:#b5896e; text-align:center; margin-top:2rem;">⚠️ 检测到记忆攀附错误，请重新开始测试。</p>`;
    footer.textContent = '';
    addRestartButton();
  }

  function addRestartButton() {
    const btn = document.createElement('button');
    btn.className = 'restart-btn';
    btn.textContent = '⟳ 重新开始';
    btn.style.margin = '1rem auto';
    btn.addEventListener('click', restartTest);
    app.appendChild(btn);
  }

  function restartTest() {
    renderQuestion(1);
  }

  // 启动
  renderQuestion(1);
</script>
</body>
</html>
